<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Song Library</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: white;
            padding: 20px;
        }

        h1 {
            color: #1DB954;
        }

        /* ===== Search Bar ===== */
        .search-bar {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .search-bar input, .search-bar select {
            padding: 8px 12px;
            border-radius: 6px;
            border: none;
            background-color: #282828;
            color: white;
            font-size: 14px;
        }

        .search-bar button {
            padding: 8px 16px;
            background-color: #1DB954;
            color: black;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }

        .search-bar button:hover {
            background-color: #17a347;
        }

        /* ===== Song Cards ===== */
        #song-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
        }

        .song-card {
            background-color: #282828;
            border-radius: 10px;
            padding: 15px;
            text-align: center;
        }

        .song-card img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 10px;
            background-color: #444;
        }

        .song-card h3 {
            margin: 5px 0;
            font-size: 15px;
            color: #fff;
        }

        .song-card p {
            margin: 3px 0;
            font-size: 13px;
            color: #aaa;
        }

        .no-image {
            width: 100%;
            height: 150px;
            background-color: #444;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #888;
            font-size: 13px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <div style="background:#2a5298;padding:15px;display:flex;
            justify-content:space-between;align-items:center;margin-bottom:20px;">
    <h2 style="margin:0;">🎵 Song Library</h2>
    <div>
        <button onclick="window.location.href='home.html'" 
                style="background:white;color:#2a5298;margin-right:8px;">Home</button>
        <button onclick="logout()" 
                style="background:#e74c3c;color:white;">Logout</button>
    </div>
</div>

<!-- Add this to the script -->
<script>
    function logout() {
        localStorage.removeItem("currentUser");
        window.location.href = "index.html";
    }
</script>

    <h1>🎵 Song Library</h1>

    <!-- Search Controls -->
    <div class="search-bar">
        <input type="text" id="search-input" placeholder="Search...">
        <select id="search-type">
            <option value="all">All Songs</option>
            <option value="title">By Title</option>
            <option value="artist">By Artist</option>
            <option value="genre">By Genre</option>
            <option value="mood">By Mood</option>
        </select>
        <button onclick="searchSongs()">Search</button>
        <button onclick="loadAllSongs()">Reset</button>
    </div>

    <!-- Song Grid -->
    <div id="song-list">Loading songs...</div>

    <script>
        const API_BASE = "http://keen-energy-production-769f.up.railway.app/api/songs";

        // ===== Load all songs on page open =====
        window.onload = loadAllSongs;

        function loadAllSongs() {
            fetch(API_BASE)
                .then(res => res.json())
                .then(songs => displaySongs(songs))
                .catch(err => {
                    document.getElementById("song-list").innerHTML = "Failed to load songs.";
                    console.error(err);
                });
        }

        // ===== Search songs by type =====
        function searchSongs() {
            const type = document.getElementById("search-type").value;
            const query = document.getElementById("search-input").value.trim();

            if (type === "all" || query === "") {
                loadAllSongs();
                return;
            }

            fetch(`${API_BASE}/${type}/${encodeURIComponent(query)}`)
                .then(res => res.json())
                .then(songs => displaySongs(songs))
                .catch(err => console.error(err));
        }

        // ===== Build song cards =====
        function displaySongs(songs) {
            const container = document.getElementById("song-list");

            if (!songs || songs.length === 0) {
                container.innerHTML = "<p>No songs found.</p>";
                return;
            }

            container.innerHTML = songs.map(song => `
                <div class="song-card">
                    ${song.imageBase64
                        ? `<img src="data:image/jpeg;base64,${song.imageBase64}" alt="${song.title}">`
                        : `<div class="no-image">No Image</div>`}
                    <h3>${song.title}</h3>
                    <p>${song.artist}</p>
                    <p>${song.genre} · ${song.mood}</p>
                    <p>${song.dateReleased}</p>
                </div>
            `).join("");
        }
    </script>

</body>
</html>
