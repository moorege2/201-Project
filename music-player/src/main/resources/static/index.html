<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Login</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(to right, #1e3c72, #2a5298);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.card {
    background: white;
    padding: 40px;
    border-radius: 12px;
    width: 350px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    text-align: center;
}

h1 {
    margin-bottom: 20px;
    color: #2a5298;
}

input {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    border-radius: 6px;
    border: 1px solid #ccc;
    box-sizing: border-box;
}

button {
    width: 100%;
    padding: 10px;
    background: #2a5298;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

button:hover {
    background: #1e3c72;
}

a {
    color: #2a5298;
    text-decoration: none;
}
</style>
</head>

<body>

<div class="card">
    <h1>Welcome Back 🎵</h1>

    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">
    <button id="loginBtn">Log In</button>

    <p id="message" style="color:red;"></p>

    <p>Don't have an account? <a href="register.html">Sign up</a></p>
</div>

<script>
document.getElementById("loginBtn").addEventListener("click", function() {
    let username = document.getElementById("username").value;
    let password = document.getElementById("password").value;

    if (!username || !password) {
        document.getElementById("message").innerText = "Please enter username and password.";
        return;
    }

    fetch("https://authentic-hope-production-6028.up.railway.app/api/users/login", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            username: username,
            password: password
        })
    })
    .then(res => res.text())
    .then(data => {
        console.log("Server said:", data);
        if (data.trim() === "Login successful") {
            localStorage.setItem("currentUser", username);
            window.location.href = "https://authentic-hope-production-6028.up.railway.app/home.html";
        } else {
            document.getElementById("message").innerText = data;
        }
    })
    .catch(err => {
        console.error(err);
        document.getElementById("message").innerText = "Connection error.";
    });
});
</script>

</body>
</html>
