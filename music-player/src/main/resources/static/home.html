<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Home</title>
    <style>
body {
    margin: 0;
    font-family: Arial;
    background-color: #121212;
    color: white;
}

.navbar {
    background: #2a5298;
    padding: 15px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

button {
    padding: 6px 12px;
    cursor: pointer;
    border: none;
    border-radius: 6px;
}

button:hover {
    opacity: 0.8;
}

.song {
    background: #1e1e1e;
    margin: 10px 0;
    padding: 15px;
    border-radius: 8px;
}
    </style>
</head>
<body>

<div class="navbar">
    <h2>🎵 My Library</h2>
    <div>
        <button onclick="window.location.href='songs.html'">Browse Songs</button>
        <button onclick="goToProfile()">Profile</button>
        <button onclick="logout()">Logout</button>
    </div>
</div>

<div style="padding:20px;">
    <input type="text" id="search" placeholder="Search your library..." 
           onkeyup="searchLibrary()" style="padding:8px; width:60%;">
</div>

<h3 style="padding-left:20px;">Saved Songs</h3>
<div id="library" style="padding:20px;">Loading...</div>

<script>

let currentUser = localStorage.getItem("currentUser");

if (!currentUser) {
    window.location.href = "http://keen-energy-production-769f.up.railway.app/index.html";
}

// ===== Load all songs on page load =====
window.onload = loadLibrary;  // ← MOVED HERE, outside the function

function loadLibrary() {
    fetch("http://keen-energy-production-769f.up.railway.app/api/songs")
    .then(res => res.json())
    .then(data => {
        let libraryDiv = document.getElementById("library");
        libraryDiv.innerHTML = "";

        if (!data || data.length === 0) {
            libraryDiv.innerHTML = "<p>No songs found.</p>";
            return;
        }

        data.forEach(song => {
            libraryDiv.innerHTML += `
                <div class="song">
                    ${song.imageBase64
                        ? `<img src="data:image/jpeg;base64,${song.imageBase64}" 
                            style="width:100%;height:120px;object-fit:cover;border-radius:6px;">`
                        : `<div style="height:120px;background:#333;border-radius:6px;
                            display:flex;align-items:center;justify-content:center;
                            color:#888;">No Image</div>`}
                    <strong>${song.title}</strong><br>
                    <span style="color:#aaa;">${song.artist} · ${song.genre} · ${song.mood}</span>
                </div>
            `;
        });
    })
    .catch(err => {
        document.getElementById("library").innerHTML = "Failed to load songs.";
        console.error(err);
    });
}

// ===== Search songs =====
function searchLibrary() {
    let query = document.getElementById("search").value.toLowerCase();

    if (query === "") {
        loadLibrary();
        return;
    }

    fetch("http://keen-energy-production-769f.up.railway.app/api/songs/title/" + encodeURIComponent(query))
    .then(res => res.json())
    .then(data => {
        let libraryDiv = document.getElementById("library");
        libraryDiv.innerHTML = "";

        let filtered = data.filter(song =>
            song.title.toLowerCase().includes(query) ||
            song.artist.toLowerCase().includes(query)
        );

        if (filtered.length === 0) {
            libraryDiv.innerHTML = "<p>No songs found.</p>";
            return;
        }

        filtered.forEach(song => {
            libraryDiv.innerHTML += `
                <div class="song">
                    ${song.imageBase64
                        ? `<img src="data:image/jpeg;base64,${song.imageBase64}" 
                            style="width:100%;height:120px;object-fit:cover;border-radius:6px;">`
                        : `<div style="height:120px;background:#333;border-radius:6px;
                            display:flex;align-items:center;justify-content:center;
                            color:#888;">No Image</div>`}
                    <strong>${song.title}</strong><br>
                    <span style="color:#aaa;">${song.artist} · ${song.genre} · ${song.mood}</span>
                </div>
            `;
        });
    });
}

function goToProfile() {
    window.location.href = "profile.html";
}

function logout() {
    localStorage.removeItem("currentUser");
    window.location.href = "http://keen-energy-production-769f.up.railway.app/index.html";
}

</script>
</body>
</html>
