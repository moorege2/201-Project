<!DOCTYPE html>
<html>

<head>
    
    <meta charset="UTF-8">
    <title>Home</title>
    <style>
body {
    margin: 0;
    font-family: Arial;
    background-color: #121212;
    color: white;
}

.navbar {
    background: #2a5298;
    padding: 15px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

button {
    padding: 6px 12px;
    cursor: pointer;
    border: none;
    border-radius: 6px;
}

button:hover {
    opacity: 0.8;
}

.song {
    background: #1e1e1e;
    margin: 10px 0;
    padding: 10px;
    border-radius: 8px;
}
</style>
</head>
<body>

<div class="navbar">
    <h2>🎵 My Library</h2>
    <div>
        <button onclick="goToProfile()">Profile</button>
        <button onclick="logout()">Logout</button>
    </div>
</div>

<div style="padding:20px;">
    <input type="text" id="search" placeholder="Search your library..." onkeyup="searchLibrary()" style="padding:8px; width:60%;">
</div>

<h3 style="padding-left:20px;">Saved Songs</h3>
<div id="library" style="padding:20px;"></div>

<script>

let currentUser = localStorage.getItem("currentUser");

if (!currentUser) {
    window.location.href = "index.html";
}

// Load user's library from Spring Boot
function loadLibrary() {
    fetch("http://localhost:8080/api/library/" + currentUser)
    .then(res => res.json())
    .then(data => {
        let libraryDiv = document.getElementById("library");
        libraryDiv.innerHTML = "";

        data.forEach(song => {
            libraryDiv.innerHTML += `
                <div class="song">
                    ${song.title} - ${song.artist}
                </div>
            `;
        });
    });
}

// Search within library
function searchLibrary() {
    let query = document.getElementById("search").value.toLowerCase();

    fetch("http://localhost:8080/api/library/" + currentUser)
    .then(res => res.json())
    .then(data => {

        let filtered = data.filter(song =>
            song.title.toLowerCase().includes(query) ||
            song.artist.toLowerCase().includes(query)
        );

        let libraryDiv = document.getElementById("library");
        libraryDiv.innerHTML = "";

        filtered.forEach(song => {
            libraryDiv.innerHTML += `
                <div class="song">
                    ${song.title} - ${song.artist}
                </div>
            `;
        });
    });
}

function goToProfile() {
    window.location.href = "profile.html";
}

function logout() {
    localStorage.removeItem("currentUser");
    window.location.href = "index.html";
}

loadLibrary();

</script>
</body>
</html>
