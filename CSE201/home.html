<!DOCTYPE html>
<html>
<head>
    <title>Home</title>
</head>
<body>

<h1>Welcome 🎶</h1>
<p>You are logged in!</p>

<ul id="song-list"></ul>


<script>
async function displayMusic() {
    const listElement = document.getElementById("song-list");
    // Grab the username we saved during login!
    const currentUser = sessionStorage.getItem("loggedInUser");

    try {
        const response = await fetch("http://localhost:8080/api/songs");
        const songs = await response.json();

        listElement.innerHTML = ""; 

        songs.forEach(song => {
            let li = document.createElement("li");
            li.style.borderBottom = "1px solid #ccc";
            li.style.padding = "10px";
            li.style.listStyle = "none";
            
            li.innerHTML = `
                <div>
                    <strong>${song.title}</strong> - ${song.artist}
                    <br><small>${song.genre} | ${song.mood}</small>
                </div>
                <button onclick="favoriteSong('${song.id}')" style="margin-top:5px;">
                    ❤️ Favorite
                </button>
            `;
            listElement.appendChild(li);
        });
    } catch (error) {
        console.error("Error:", error);
        listElement.innerHTML = "<li>Error loading songs. Is Java running?</li>";
    }
}
async function favoriteSong(songId) {
    const username = sessionStorage.getItem("loggedInUser");
    
    if (!username) {
        alert("Please login first!");
        return;
    }

    try {
        // This hits the @PostMapping in your SongController that calls SongService
        const response = await fetch(`http://localhost:8080/api/songs/favorite?username=${username}&songId=${songId}`, {
            method: 'POST'
        });

        const message = await response.text();
        alert(message); // Should say "Song favorited."
    } catch (error) {
        console.log("Error favoriting:", error);
    }
}

window.onload = displayMusic;
</script>

</body>
</html>
