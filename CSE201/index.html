<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
</head>
<body>

<h1>Login 🎵</h1>

<form id="loginForm">
    <label>Username:</label><br>
    <input type="text" id="username" required><br><br>

    <label>Password:</label><br>
    <input type="password" id="password" required><br><br>

    <button type="button" onclick="loginUser()">Login</button>
</form>

<p id="message" style="color: red; font-weight: bold;"></p>

<p>Don't have an account? <a href="register.html">Register here</a></p>

<script>
async function loginUser() {
    console.log("Login button clicked...");
    
    let username = document.getElementById("username").value;
    let password = document.getElementById("password").value;
    let msg = document.getElementById("message");

    try {
        const response = await fetch("http://localhost:8080/api/users/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username: username, password: password })
        });

        const resultText = await response.text();
        console.log("Java Login Response:", resultText);

        // This covers "Login successful" or "Login successful."
        if (resultText.toLowerCase().includes("successful")) {
            alert("Login successful! Welcome back.");
            
            // Save the user session
            sessionStorage.setItem("loggedInUser", username);
            
            // Redirect to home
            window.location.href = "home.html";
        } else {
            msg.innerText = resultText; // Shows "Incorrect password" etc.
        }
    } catch (error) {
        console.error("Login Error:", error);
        msg.innerText = "Error: Cannot connect to Java server.";
    }
}
</script>

</body>
</html>
